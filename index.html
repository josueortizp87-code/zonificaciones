<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENEE - Zonificación de Red</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>

<div id="form-zonificacion-container" class="container">

    <header style="text-align: center;">
        <img src="https://www.eneeutcd.hn/es/dominios/enee.pagegear.co/plantillas/2024/recursos/logo_utcd.svg"
             alt="ENEE" class="logo-central">
        <h1 class="titulo-blanco">SECTOR JUTICALPA - ZONIFICACIÓN</h1>
        <p style="color: #bdc3c7; font-size: 0.8em;">Desarrollador - Josué Ortiz</p>
    </header>

    <div class="input-group">
        <label class="label-resaltado">Circuito:</label>
        <select id="zonif-circuito" class="select-profesional">
            <option>JUT-L379</option><option>JUT-L380</option><option>JUT-L381</option>
            <option>JUT-L382</option><option>CAT-L375</option><option>CAT-L376</option>
            <option>GMC-L377 RS CAMPAMENTO</option>
        </select>
    </div>

    <div class="input-group">
        <label class="label-resaltado">Zona de Levantamiento:</label>
        <input type="text" id="zonif-area" class="input-profesional">
    </div>

    <div id="map-zonif" class="mapa-borde"></div>

    <div class="grid-2">
        <button class="btn-accion" onclick="abrirModalPunto('EXISTENTE')">+ EXISTENTE</button>
        <button class="btn-accion" onclick="abrirModalPunto('PROYECTADA')">+ PROYECTADA</button>
    </div>

    <div class="grid-2">
        <button class="btn-linea" onclick="setModoDibujo('EXISTENTE')">LÍNEA EXISTENTE</button>
        <button class="btn-linea" onclick="setModoDibujo('PROYECTADA')">LÍNEA PROYECTADA</button>
    </div>

    <button class="btn-pptx" onclick="generarPowerPoint()">GENERAR PPTX</button>

</div>

<!-- MODAL -->
<div id="modal-punto" class="modal" style="display:none;">
    <div class="modal-content">

        <label>N° Apoyo:</label><input type="text" id="p-apoyo" class="input-form">

        <label>Tipo Poste:</label>
        <select id="p-tipo-poste" class="input-form">
            <option>PC 30FT</option><option>PC 35FT</option><option>PC 40FT</option><option>PC 45FT</option>
            <option>PMA 30FT</option><option>PMA 35FT</option><option>PMA 40FT</option><option>PMA 45FT</option>
            <option>PME 30FT</option><option>PME 35FT</option><option>PME 40FT</option><option>PME 45FT</option>
        </select>

        <label>Transformador:</label>
        <select id="p-trafo" class="input-form">
            <option value="N/A">Sin Trafo</option>
            <option value="15kVA">15 kVA</option><option value="25kVA">25 kVA</option>
            <option value="37.5kVA">37.5 kVA</option><option value="50kVA">50 kVA</option>
            <option value="75kVA">75 kVA</option><option value="100kVA">100 kVA</option>
        </select>

        <label>Clientes:</label><input type="number" id="p-clientes" class="input-form" value="0">

        <button onclick="guardarPunto()">Guardar</button>
        <button onclick="cerrarModalPunto()">Cancelar</button>

    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="app.js" defer></script>

</body>
</html>
